* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    background: #1e293b;
    font-size: 18px;
    font-weight: bold;
}

/* CHAT AREA */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE BOX */
.msg {
    margin: 8px;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
    font-size: 15px;
}

/* USER MESSAGE */
.user {
    background: #2563eb;
    align-self: flex-end;
    text-align: right;
}

/* BOT MESSAGE */
.bot {
    background: #334155;
    align-self: flex-start;
}

/* INPUT AREA */
.inputBox {
    display: flex;
    padding: 10px;
    background: #1e293b;
    gap: 5px;
}

/* INPUT FIELD */
input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
}

/* BUTTONS */
button {
    padding: 12px 14px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

button:hover {
    background: #16a34a;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 600px) {
    header {
        font-size: 16px;
        padding: 12px;
    }

    .msg {
        max-width: 90%;
        font-size: 14px;
    }

    .inputBox {
        flex-direction: column;
    }

    input {
        width: 100%;
    }

    button {
        width: 100%;
    }

    button + button {
        margin-top: 5px;
    }
}
</style>

// 💬 CHAT UI
function addMsg(text, type){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = chat.scrollHeight;
}

// 🧠 AI ENGINE
function getReply(text){
    text = text.toLowerCase();

    for(let i=0;i<brain.length;i++){
        for(let j=0;j<brain[i].keys.length;j++){
            if(text.includes(brain[i].keys[j])){
                return brain[i].reply;
            }
        }
    }

    return brain[brain.length-1].reply;
}

// 🔊 TEXT TO SPEECH
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 0.95;
    speechSynthesis.speak(msg);
}

// 🎤 SPEECH TO TEXT
function startSpeech(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Not supported in this browser");
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(e){
        let text = e.results[0][0].transcript;
        document.getElementById("input").value = text;
        send();
    };
}

// 🎮 XP SYSTEM
function addXP(){
    xp += 10;

    if(xp >= 100){
        level++;
        xp = 0;
        alert("🎉 Level Up! Level " + level);
    }
}

// 💬 SEND MESSAGE
function send(){
    let input = document.getElementById("input");
    let text = input.value;
    if(!text) return;

    addMsg(text, "user");

    let reply = getReply(text);

    addMsg(reply, "bot");
    speak(reply);

    addXP();

    input.value = "";
}

// welcome message
addMsg("Hello! I am your AI English Tutor. Start speaking!", "bot");


document.getElementById("input").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        send();
    }
});
